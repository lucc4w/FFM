<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FFM</title>
  <link rel="preconnect" href="https://de1.api.radio-browser.info" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="site-header">
    <nav class="site-nav" aria-label="Menu principal">
      <a href="#inicio">Inicio</a>
      <a href="#radios">Radios</a>
      <a href="#sobre">Sobre</a>
    </nav>
  </header>

  <main id="inicio" class="stage">
    <section class="hero" aria-labelledby="app-title">
      <div class="brand-badge" aria-hidden="true">FFM</div>
      <h1 id="app-title" class="sr-only">FFM</h1>
    </section>

    <section id="radios" class="radio-console" aria-label="Buscar e ouvir radios">
      <form class="search-box" id="search-form">
        <label class="sr-only" for="search-input">Buscar estação</label>
        <div class="search-control">
          <input id="search-input" name="search" type="search" placeholder="Digite sua estação preferida"
            autocomplete="off" />
          <button type="submit">Buscar</button>
        </div>
      </form>

      <p class="now-playing" id="now-playing">Escolha sua estação preferida.</p>

      <div class="player-shell">
        <button class="skip-button" id="previous-button" type="button" aria-label="Radio anterior">
          <span class="previous-icon"></span>
        </button>
        <button class="play-button" id="play-button" type="button" aria-label="Tocar ou pausar">
          <span class="pause-icon"></span>
        </button>
        <button class="skip-button next" id="next-button" type="button" aria-label="Proxima radio">
          <span class="next-icon"></span>
        </button>

        <div class="volume-control">
          <button class="volume-button" type="button" aria-label="Controle de volume">
            <span class="volume-icon" aria-hidden="true"></span>
          </button>
          <div class="volume-panel">
            <label for="volume-slider">Volume</label>
            <input id="volume-slider" type="range" min="0" max="100" value="40" />
            <span class="volume-value" id="volume-value">40%</span>
          </div>
        </div>
      </div>

      <div class="status-line" id="status-line" role="status">Carregando radios do Brasil...</div>

      <div class="station-list" id="station-list" aria-live="polite"></div>
    </section>

    <section id="sobre" class="info-section">
      <h2>FFM</h2>
      <p>
        lucc4w &copy; 2026.
      </p>
    </section>

  </main>

  <audio id="audio-player" crossorigin="anonymous"></audio>
  <script src="script.js"></script>
</body>

</html>
